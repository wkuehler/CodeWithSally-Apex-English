<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Square and Circle</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: #f0f0f0;
    }
  </style>
</head>
<body>
  <canvas id="canvas" width="150" height="150"></canvas>
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    ctx.fillStyle = 'red';
    ctx.fillRect(0, 0, 150, 150);

    ctx.fillStyle = 'blue';
    ctx.beginPath();
    ctx.arc(75, 75, 20, 0, Math.PI * 2);
    ctx.fill();
  </script>
</body>
</html>
